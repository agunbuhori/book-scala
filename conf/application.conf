play.http.errorHandler = "errors.ApiErrorHandler"
play.filters.enabled += play.filters.cors.CORSFilter

play.filters.cors {
  pathPrefixes = ["/api"]
  allowedOrigins = ["*"]
  allowedHttpMethods = ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
  allowedHttpHeaders = ["Accept", "Content-Type", "Authorization"]
}

db.default.driver = "com.mysql.cj.jdbc.Driver"
db.default.url = "jdbc:mysql://localhost:3306/pemesanan_buku?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
db.default.url = ${?DB_URL}
db.default.username = "root"
db.default.username = ${?DB_USER}
db.default.password = ""
db.default.password = ${?DB_PASSWORD}

play.evolutions.enabled = true
play.evolutions.autoApply = true

play.server.http.port = 9002
play.server.pidfile.path = "/dev/null"
